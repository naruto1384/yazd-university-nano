      </p>

      <div class="quick-grid">

        <a class="quick-card" href="https://t.me/nano_yazduni" target="_blank" rel="noopener">
          <div>
            <h3 class="quick-card__title">تلگرام</h3>
            <p class="quick-card__text">آیدی تلگرام: @nano_yazduni</p>
