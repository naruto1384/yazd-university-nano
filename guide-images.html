<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مراحل جستجوی کتاب</title>
    <link rel="stylesheet" href="css/style.css">

    <style>
        body {
            background: #f1f5f9;
            font-family: Tahoma;
            text-align: center;
            padding: 30px;
        }

        h1 {
            color: #1e293b;
            margin-bottom: 30px;
        }

        .gallery {
            max-width: 900px;
            margin: auto;
            display: grid;
            grid-template-columns: 1fr;
            gap: 30px;
        }

        .gallery img {
            width: 100%;
            max-height: 600px;
            border-radius: 12px;
            object-fit: contain;
            box-shadow: 0 4px 14px rgba(0,0,0,0.1);
            cursor: zoom-in;
        }

        /* مودال بزرگ‌نمایی */
        .image-modal {
            display: none;
            position: fixed;
            z-index: 999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
        }

        .image-modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
        }

        .image-modal.active {
            display: flex;
        }

        .back-btn {
            margin-top: 30px;
            display: inline-block;
            padding: 12px 25px;
            background: #2563eb;
            color: white;
            border-radius: 10px;
            text-decoration: none;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: #1d4ed8;
        }

    </style>

</head>

<body>

<h1>مراحل جستجوی کتاب در سامانه</h1>

<div class="gallery">
    <img src="images/1.jpg" alt="مرحله ۱" onclick="openImage(this)">
    <img src="images/2.jpg" alt="مرحله ۲" onclick="openImage(this)">
    <img src="images/3.jpg" alt="مرحله ۳" onclick="openImage(this)">
    <img src="images/4.jpg" alt="مرحله ۴" onclick="openImage(this)">
</div>

<!-- مودال بزرگ‌نمایی -->
<div id="imageModal" class="image-modal" onclick="closeImage()">
    <img id="modalImg">
</div>

<!-- دکمه برگشت -->
<a href="library.html" class="back-btn">بازگشت به صفحه راهنما</a>

<script>
    function openImage(img) {
        const modal = document.getElementById("imageModal");
        const modalImg = document.getElementById("modalImg");

        modalImg.src = img.src;
        modal.classList.add("active");
    }

    function closeImage() {
        document.getElementById("imageModal").classList.remove("active");
    }
</script>

</body>
</html>
